datasets:
  conll_en:
    dataset: conll2003
    language: null
    glove_path: ./data/glove.6B.300d.txt
    use_pretrained_embeddings: true
  wikiann_mr:
    dataset: wikiann
    language: mr
    glove_path: null
    use_pretrained_embeddings: false
  wikiann_hi:
    dataset: wikiann
    language: hi
    glove_path: null
    use_pretrained_embeddings: false
  wikiann_ta:
    dataset: wikiann
    language: ta
    glove_path: null
    use_pretrained_embeddings: false
  wikiann_bn:
    dataset: wikiann
    language: bn
    glove_path: null
    use_pretrained_embeddings: false
  wikiann_te:
    dataset: wikiann
    language: te
    glove_path: null
    use_pretrained_embeddings: false
common_settings:
  embedding_dim: 300
  dropout: 0.2
  batch_size: 32
  learning_rate: 0.001
  num_epochs: 30
  patience: 5
  min_freq: 2
  lambda_sparse: 0.001
  lambda_diverse: 0.01
  use_receptors: true
  use_glomeruli: true
  use_crf: true
experiments:
  baseline:
    embedding_dim: 300
    dropout: 0.2
    batch_size: 32
    learning_rate: 0.001
    num_epochs: 30
    patience: 5
    min_freq: 2
    lambda_sparse: 0.001
    lambda_diverse: 0.01
    use_receptors: false
    use_glomeruli: false
    use_crf: true
    model_type: baseline
    lstm_hidden: 256
    lstm_layers: 1
  olfactory:
    embedding_dim: 300
    dropout: 0.2
    batch_size: 32
    learning_rate: 0.001
    num_epochs: 30
    patience: 5
    min_freq: 2
    lambda_sparse: 0.001
    lambda_diverse: 0.01
    use_receptors: true
    use_glomeruli: true
    use_crf: true
    model_type: olfactory
    num_receptors: 128
    num_glomeruli: 32
    activation: gelu
  more_receptors:
    embedding_dim: 300
    dropout: 0.2
    batch_size: 32
    learning_rate: 0.001
    num_epochs: 30
    patience: 5
    min_freq: 2
    lambda_sparse: 0.001
    lambda_diverse: 0.05
    use_receptors: true
    use_glomeruli: true
    use_crf: true
    model_type: olfactory
    num_receptors: 256
    num_glomeruli: 64
    activation: gelu
  more_glomeruli:
    embedding_dim: 300
    dropout: 0.2
    batch_size: 32
    learning_rate: 0.001
    num_epochs: 30
    patience: 5
    min_freq: 2
    lambda_sparse: 0.001
    lambda_diverse: 0.01
    use_receptors: true
    use_glomeruli: true
    use_crf: true
    model_type: olfactory
    num_receptors: 128
    num_glomeruli: 64
    activation: gelu
  more_receptors_more_glomeruli:
    embedding_dim: 300
    dropout: 0.2
    batch_size: 32
    learning_rate: 0.001
    num_epochs: 30
    patience: 5
