# Marathi NER Tuning Experiments Configuration
# Using ai4bharat/naamapadam dataset

# Experiment 1: GELU Activation
activation_gelu:
  model_type: "olfactory"
  embedding_dim: 300
  num_receptors: 128
  num_glomeruli: 32
  activation: "gelu"
  dropout: 0.2
  batch_size: 32
  learning_rate: 0.001
  num_epochs: 20
  patience: 5
  data_dir: "./data/naamapadam"
  glove_path: "./data/glove.6B.300d.txt"
  min_freq: 2

