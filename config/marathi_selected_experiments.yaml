# Marathi NER - Selected Experiments Only
# Dataset: WikiANN Marathi (7 labels: O, B-PER, I-PER, B-ORG, I-ORG, B-LOC, I-LOC)

# Experiment 1: GELU Activation
activation_gelu:
  model_type: "olfactory"
  embedding_dim: 300
  num_receptors: 128
  num_glomeruli: 32
  activation: "gelu"
  dropout: 0.2
  batch_size: 32
  learning_rate: 0.001
  num_epochs: 20
  patience: 5
  data_dir: "./data/wikiann"
  glove_path: "./data/glove.6B.300d.txt"
  min_freq: 2
  use_pretrained_embeddings: false
  use_receptors: true
  use_glomeruli: true
  lambda_sparse: 0.001
  lambda_diverse: 0.01

