# Marathi NER - Selected Experiments Only
# Dataset: WikiANN Marathi (7 labels: O, B-PER, I-PER, B-ORG, I-ORG, B-LOC, I-LOC)

# Experiment 1: GELU Activation
activation_gelu:
  model_type: "olfactory"
  embedding_dim: 300
  num_receptors: 128
  num_glomeruli: 32
  activation: "gelu"
  dropout: 0.2
  batch_size: 32
  learning_rate: 0.001
  num_epochs: 20
  patience: 5
  data_dir: "./data/wikiann"
  glove_path: "./data/glove.6B.300d.txt"
  min_freq: 2
  use_pretrained_embeddings: false  # WikiANN is Marathi, GloVe is English
  use_receptors: true
  use_glomeruli: true
  lambda_sparse: 0.001
  lambda_diverse: 0.01

# Experiment 2: Mish Activation  
activation_mish:
  model_type: "olfactory"
  embedding_dim: 300
  num_receptors: 128
  num_glomeruli: 32
  activation: "mish"
  dropout: 0.2
  batch_size: 32
  learning_rate: 0.001
  num_epochs: 20
  patience: 5
  data_dir: "./data/wikiann"
  glove_path: "./data/glove.6B.300d.txt"
  min_freq: 2
  use_pretrained_embeddings: false
  use_receptors: true
  use_glomeruli: true
  lambda_sparse: 0.001
  lambda_diverse: 0.01

# Experiment 3: More Glomeruli (64)
more_glomeruli:
  model_type: "olfactory"
  embedding_dim: 300
  num_receptors: 128
  num_glomeruli: 64  # Doubled from 32
  activation: "gelu"
  dropout: 0.2
  batch_size: 32
  learning_rate: 0.001
  num_epochs: 20
  patience: 5
  data_dir: "./data/wikiann"
  glove_path: "./data/glove.6B.300d.txt"
  min_freq: 2
  use_pretrained_embeddings: false
  use_receptors: true
  use_glomeruli: true
  lambda_sparse: 0.001
  lambda_diverse: 0.01

# Experiment 4: GELU + More Receptors (256)
gelu_more_receptors:
  model_type: "olfactory"
  embedding_dim: 300
  num_receptors: 256  # Doubled
  num_glomeruli: 64   # Doubled to maintain ratio
  activation: "gelu"
  dropout: 0.2
  batch_size: 32
  learning_rate: 0.001
  num_epochs: 20
  patience: 5
  data_dir: "./data/wikiann"
  glove_path: "./data/glove.6B.300d.txt"
  min_freq: 2
  use_pretrained_embeddings: false
  use_receptors: true
  use_glomeruli: true
  lambda_sparse: 0.001
  lambda_diverse: 0.05  # Strong diversity

# Experiment 5: Baseline BiLSTM-CRF (no olfactory components)
baseline:
  model_type: "baseline"
  embedding_dim: 300
  lstm_hidden: 256
  lstm_layers: 1
  dropout: 0.2
  batch_size: 32
  learning_rate: 0.001
  num_epochs: 20
  patience: 5
  data_dir: "./data/wikiann"
  glove_path: "./data/glove.6B.300d.txt"
  min_freq: 2
  use_pretrained_embeddings: false
