# Experiment configurations for olfaction-inspired NER

# Baseline BiLSTM-CRF
baseline:
  model_type: "baseline"
  embed_dim: 300
  lstm_hidden: 256
  lstm_layers: 1
  dropout: 0.5
  batch_size: 32
  learning_rate: 0.001
  max_epochs: 50
  early_stopping_patience: 5
  
  # Regularization
  lambda_sparse: 0.0
  lambda_diverse: 0.0

# Full Olfactory-NER model
olfactory_full:
  model_type: "olfactory"
  embed_dim: 300
  num_receptors: 128
  num_glomeruli: 32
  lstm_hidden: 256
  lstm_layers: 1
  dropout: 0.5
  use_receptors: true
  use_glomeruli: true
  batch_size: 32
  learning_rate: 0.001
  max_epochs: 50
  early_stopping_patience: 5
  
  # Regularization weights
  lambda_sparse: 0.001  # Sparsity loss weight
  lambda_diverse: 0.01  # Diversity loss weight

# Ablation 1: No sparsity regularization
olfactory_no_sparse:
  model_type: "olfactory"
  embed_dim: 300
  num_receptors: 128
  num_glomeruli: 32
  lstm_hidden: 256
  lstm_layers: 1
  dropout: 0.5
  use_receptors: true
  use_glomeruli: true
  batch_size: 32
  learning_rate: 0.001
  max_epochs: 50
  early_stopping_patience: 5
  
  lambda_sparse: 0.0  # Disabled
  lambda_diverse: 0.01

# Ablation 2: No glomerular layer
olfactory_no_glomeruli:
  model_type: "olfactory"
  embed_dim: 300
  num_receptors: 128
  num_glomeruli: 32  # Ignored when use_glomeruli=false
  lstm_hidden: 256
  lstm_layers: 1
  dropout: 0.5
  use_receptors: true
  use_glomeruli: false  # Skip glomeruli
  batch_size: 32
  learning_rate: 0.001
  max_epochs: 50
  early_stopping_patience: 5
  
  lambda_sparse: 0.001
  lambda_diverse: 0.01

# Data configuration
data:
  data_dir: "./data/raw"
  glove_path: "./data/glove.6B.300d.txt"  # Download from https://nlp.stanford.edu/projects/glove/
  min_word_freq: 2
  use_pretrained_embeddings: true

# Training configuration
training:
  device: "cuda"  # Will auto-detect, use "cpu" if no GPU
  seed: 42
  num_workers: 2
  gradient_clip: 5.0
  
  # Logging
  log_interval: 100  # Log every N batches
  save_dir: "./results"
  tensorboard_dir: "./runs"
