  lambda_sparse: 0.001
  lambda_diverse: 0.1  # 10x stronger

# Experiment 8: GELU + More Receptors (Best Combo?)
gelu_more_receptors:
  model_type: "olfactory"
  embed_dim: 300
  num_receptors: 256
  num_glomeruli: 64
  receptor_activation: "gelu"  # Biological activation
  lstm_hidden: 256
  lstm_layers: 1
  dropout: 0.5
  use_receptors: true
  use_glomeruli: true
  batch_size: 32
  learning_rate: 0.001
  max_epochs: 20
  early_stopping_patience: 5
  lambda_sparse: 0.001
  lambda_diverse: 0.05  # Strong diversity

# Experiment 9: Minimal Model (Receptors only, no glomeruli, GELU)
minimal_gelu:
  model_type: "olfactory"
  embed_dim: 300
  num_receptors: 128
  num_glomeruli: 32  # Ignored
  receptor_activation: "gelu"
  lstm_hidden: 256
  lstm_layers: 1
  dropout: 0.5
  use_receptors: true
  use_glomeruli: false  # Skip glomeruli (we saw this works best!)
  batch_size: 32
  learning_rate: 0.001
  max_epochs: 20
  early_stopping_patience: 5
  lambda_sparse: 0.001
  lambda_diverse: 0.05

# Data and Training configs (shared)
data:
  data_dir: "./data/raw"
  glove_path: "./data/glove.6B.300d.txt"
  min_word_freq: 2
  use_pretrained_embeddings: true

training:
  device: "cuda"
  seed: 42
  num_workers: 2
  gradient_clip: 5.0
  log_interval: 100
  save_dir: "./results"
  tensorboard_dir: "./runs"
