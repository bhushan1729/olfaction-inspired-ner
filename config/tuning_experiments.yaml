  model_type: "olfactory"
  embed_dim: 300
  num_receptors: 256  # Doubled
  num_glomeruli: 64   # Doubled to maintain 4:1 ratio
  receptor_activation: "gelu"
  lstm_hidden: 256
  lstm_layers: 1
  dropout: 0.5
  use_receptors: true
  use_glomeruli: true
  batch_size: 32
  learning_rate: 0.001
  max_epochs: 20
  early_stopping_patience: 5
  lambda_sparse: 0.001
  lambda_diverse: 0.01

# Experiment 5: Fewer Receptors (64 instead of 128)
fewer_receptors:
  model_type: "olfactory"
  embed_dim: 300
  num_receptors: 64   # Halved
  num_glomeruli: 16   # Halved to maintain 4:1 ratio
  receptor_activation: "gelu"
  lstm_hidden: 256
  lstm_layers: 1
  dropout: 0.5
  use_receptors: true
  use_glomeruli: true
  batch_size: 32
  learning_rate: 0.001
  max_epochs: 20
  early_stopping_patience: 5
  lambda_sparse: 0.001
  lambda_diverse: 0.01

# Experiment 5b: More Glomeruli (128 receptors -> 64 glomeruli, 2:1 ratio)
more_glomeruli:
  model_type: "olfactory"
  embed_dim: 300
  num_receptors: 128
  num_glomeruli: 64   # Doubled from 32 (2:1 ratio instead of 4:1)
  receptor_activation: "gelu"
  lstm_hidden: 256
  lstm_layers: 1
  dropout: 0.5
  use_receptors: true
  use_glomeruli: true
  batch_size: 32
  learning_rate: 0.001
  max_epochs: 20
  early_stopping_patience: 5
  lambda_sparse: 0.001
  lambda_diverse: 0.01

