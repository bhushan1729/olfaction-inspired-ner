# Tuning Experiments Configuration

# Experiment 1: GELU Activation
activation_gelu:
  model_type: "olfactory"
  embed_dim: 300
  num_receptors: 128
  num_glomeruli: 32
  receptor_activation: "gelu"  # Changed from relu
  lstm_hidden: 256
  lstm_layers: 1
  dropout: 0.5
  use_receptors: true
  use_glomeruli: true
  batch_size: 32
  learning_rate: 0.001
  max_epochs: 20
  early_stopping_patience: 5
  lambda_sparse: 0.001
  lambda_diverse: 0.01

# Experiment 2: Swish Activation
activation_swish:
  model_type: "olfactory"
  embed_dim: 300
  num_receptors: 128
  num_glomeruli: 32
  receptor_activation: "swish"  # Changed from relu
  lstm_hidden: 256
  lstm_layers: 1
  dropout: 0.5
  use_receptors: true
  use_glomeruli: true
  batch_size: 32
  learning_rate: 0.001
  max_epochs: 20
  early_stopping_patience: 5
  lambda_sparse: 0.001
  lambda_diverse: 0.01

